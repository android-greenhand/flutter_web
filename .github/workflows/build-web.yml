name: Build Flutter Web

on:
  push:
    branches: [ main ]  # 或者你的主分支名称
  pull_request:
    branches: [ main ]  # 或者你的主分支名称
  workflow_dispatch:    # 允许手动触发

permissions:
  contents: write  # 需要这个权限来部署到 GitHub Pages

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.2'  # 使用错误信息建议的版本
        channel: 'stable'
        cache: true
        cache-key: flutter-3.32.2-stable
    
    - name: Enable Flutter Web
      run: flutter config --enable-web
    
    - name: Get Flutter version
      run: flutter --version
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Create env file
      run: |
        echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" > .env
        echo "export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" > .env.sh
    
    - name: Build Web
      run: |
        source .env.sh
        flutter build web --release --dart-define=GITHUB_TOKEN=$GITHUB_TOKEN --base-href /flutter/
    
    - name: Clean up
      run: |
        # 删除环境文件
        rm -f .env .env.sh
        # 清理构建产物
        find build/web -type f -name "*.js" -exec sed -i 's/ghp_[^"]*"/""/g' {} +
        find build/web -type f -name "*.js" -exec sed -i 's/github_pat_[^"]*"/""/g' {} +
        find build/web -type f -name "*.js" -exec sed -i 's/gho_[^"]*"/""/g' {} +
        find build/web -type f -name "*.js" -exec sed -i 's/GITHUB_TOKEN[^"]*"/GITHUB_TOKEN""/g' {} +
        # 删除可能包含 token 的文件
        find build/web -type f -name "*.js.map" -delete
        find build/web -type f -name "*.dart.js" -delete
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/web
        publish_branch: gh-pages  # 部署到这个分支
        force_orphan: true  # 强制创建新的分支
        commit_message: "Deploy to GitHub Pages"  # 自定义提交信息 